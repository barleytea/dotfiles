[tools]
node = "lts"
go = "1.24.5"
python = "system"
# renovate: datasource=github-releases depName=aws/aws-cli
awscli = "2.22.28"
# Pin npm CLIs so CI remains reproducible and npm min-release-age stays effective.
"npm:aws-cdk" = "2.1034.0"
"npm:@redocly/cli" = "1.34.4"
"npm:corepack" = "0.33.0"
"npm:@google/gemini-cli" = "0.1.7"
"npm:@openai/codex" = "0.133.0"
"npm:ccusage" = "18.0.10"
"npm:difit" = "3.1.15"
"pipx:pre-commit" = "latest"

[settings]
experimental = true
plugin_autoupdate_last_check_duration = "7 days"
trusted_config_paths = ["~"]

[tasks.npm-commitizen]
description = "Install commitizen and cz-git globally"
run = ["aikido-npm install -g commitizen cz-git"]

[tasks.copilot-install]
description = "Install GitHub Copilot CLI via official install script"
run = ["curl -fsSL https://gh.io/copilot-install | bash"]

[tasks.claude-install]
description = "Install Claude Code CLI via official install script"
run = ["curl -fsSL https://claude.ai/install.sh | bash"]

[tasks.pre-commit-init]
description = "Install pre-commit hooks"
run = ["pre-commit install"]

[tasks.safe-chain-install]
description = "Install safe-chain via official install script"
run = ["curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh"]

[tasks.safe-chain-setup]
description = "Set up aikido safe-chain (CA cert + npm proxy)"
run = ["safe-chain setup"]

[tasks.herdr-install]
description = "Install herdr agent multiplexer via official install script"
run = ["curl -fsSL https://herdr.dev/install.sh | sh"]
