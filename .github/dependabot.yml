version: 2
updates:
  # Nix-managed mise npm pins live in *.nix, so Dependabot cannot update them
  # directly. Use `make mise-update-npm-tools` for that workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
