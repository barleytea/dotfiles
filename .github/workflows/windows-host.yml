name: Windows Host UX CI

on:
  push:
    branches: [main]
    paths:
      - 'windows-ctf/**'
      - '.github/workflows/windows-host.yml'
  pull_request:
    branches: [main]
    paths:
      - 'windows-ctf/**'
      - '.github/workflows/windows-host.yml'

jobs:
  pwsh-parse:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse all PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path windows-ctf -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors -and $parseErrors.Count -gt 0) {
              $messages = $parseErrors | ForEach-Object { $_.Message }
              $errors += "Parse error in $($_.FullName): $($messages -join '; ')"
            }
          }

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

  ps-lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run PSScriptAnalyzer (Error severity)
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path windows-ctf/host-windows/scripts/*.ps1 -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            throw "PSScriptAnalyzer reported $($results.Count) error(s)."
          }

      - name: Run PSScriptAnalyzer (Warning severity report)
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path windows-ctf/host-windows/scripts/*.ps1 -Severity Warning
          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
          } else {
            Write-Host "No warnings."
          }

  json-validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON config files
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Path windows-ctf -Recurse -Filter *.json | ForEach-Object {
            try {
              Get-Content $_.FullName -Raw | ConvertFrom-Json | Out-Null
              Write-Host "[OK] $($_.FullName)"
            }
            catch {
              Write-Error "[NG] Invalid JSON: $($_.FullName) - $($_.Exception.Message)"
              $failed = $true
            }
          }

          if ($failed) {
            exit 1
          }

  ahk-policy-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce AHK and state policy
        shell: pwsh
        run: |
          $ahkBase = 'windows-ctf/host-windows/config/ahk/keymap.base.ahk'
          $statePath = 'windows-ctf/host-windows/config/ahk/state.json'

          if (-not (Test-Path $ahkBase)) { throw "Missing file: $ahkBase" }
          if (-not (Test-Path $statePath)) { throw "Missing file: $statePath" }

          $ahk = Get-Content $ahkBase -Raw
          if ($ahk -notmatch 'CapsLock::Ctrl') {
            throw 'Policy violation: CapsLock::Ctrl must exist in keymap.base.ahk'
          }

          if ($ahk -notmatch '\^!Pause::Suspend\s-1') {
            throw 'Policy violation: emergency suspend hotkey (^!Pause::Suspend -1) must exist'
          }

          $state = Get-Content $statePath -Raw | ConvertFrom-Json
          if ($state.caps_as_ctrl -ne $true) {
            throw 'Policy violation: state.json caps_as_ctrl must be true'
          }

          Write-Host 'AHK policy checks passed.'

  winget-manifest-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate winget package IDs
        shell: pwsh
        run: |
          $manifest = 'windows-ctf/host-windows/manifests/apps-winget.txt'
          if (-not (Test-Path $manifest)) {
            throw "Missing manifest: $manifest"
          }

          $ids = Get-Content $manifest | ForEach-Object { $_.Trim() } | Where-Object {
            $_ -and -not $_.StartsWith('#')
          }

          $missing = @()
          foreach ($id in $ids) {
            Write-Host "Checking $id"
            winget show --id $id --exact --accept-source-agreements *> $null
            if ($LASTEXITCODE -ne 0) {
              $missing += $id
            }
          }

          if ($missing.Count -gt 0) {
            throw "Invalid or unresolved winget IDs: $($missing -join ', ')"
          }

          Write-Host 'winget manifest checks passed.'
