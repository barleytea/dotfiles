name: Windows CTF CI

on:
  push:
    branches: [main]
    paths:
      - 'windows-ctf/**'
      - '.github/workflows/windows-host.yml'
  pull_request:
    branches: [main]
    paths:
      - 'windows-ctf/**'
      - '.github/workflows/windows-host.yml'

jobs:
  bash-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          find windows-ctf -name '*.sh' | while IFS= read -r f; do
            bash -n "$f" || exit 1
            echo "[OK] $f"
          done

      - name: Validate JSON files
        run: |
          find windows-ctf -name '*.json' | while IFS= read -r f; do
            jq . "$f" > /dev/null || exit 1
            echo "[OK] $f"
          done

  setup-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub install-bash-tools.sh (skip network installs in CI)
        run: |
          cat > windows-ctf/scripts/install-bash-tools.sh <<'EOF'
          #!/usr/bin/env bash
          echo "[STUB] install-bash-tools skipped in CI"
          EOF

      - name: Run setup-bash.sh
        run: bash windows-ctf/scripts/setup-bash.sh

      - name: Verify symlinks exist
        run: |
          for f in \
            "$HOME/.config/bash/bashrc.sh" \
            "$HOME/.config/starship/starship.toml" \
            "$HOME/.config/atuin/config.toml" \
            "$HOME/.tmux.conf" \
            "$HOME/.config/git/config" \
            "$HOME/.config/git/ignore" \
            "$HOME/.czrc"; do
            if [ -e "$f" ]; then
              echo "[OK] $f"
            else
              echo "[NG] missing: $f" && exit 1
            fi
          done

      - name: Verify .bashrc snippet
        run: |
          grep -q '\.config/bash/bashrc\.sh' "$HOME/.bashrc" \
            && echo "[OK] .bashrc snippet present" \
            || { echo "[NG] .bashrc snippet missing"; exit 1; }

      - name: Source bashrc.sh without errors
        run: bash "$HOME/.config/bash/bashrc.sh"
