name: NixOS CI
on:
  push:
    branches: [main]
    paths:
      - 'nixos/**'
      - 'modules/**'
      - 'nixvim/**'
      - '.github/workflows/nixos.yml'
      - '.github/actions/setup-nix/**'
  pull_request:
    branches: [main]
    paths:
      - 'nixos/**'
      - 'modules/**'
      - 'nixvim/**'
      - '.github/workflows/nixos.yml'
      - '.github/actions/setup-nix/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"

    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "Disk space after cleanup:"
          df -h

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check NixOS configuration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIXVIM_CONFIG_INPUT: path:${{ github.workspace }}/nixvim
          DOTFILES_SHARED_INPUT: path:${{ github.workspace }}/modules
        run: |
          export NIX_CONFIG="access-tokens = github.com=$GITHUB_TOKEN"
          cd nixos
          nix build path:.#nixosConfigurations.desktop.config.system.build.toplevel --dry-run --impure --no-write-lock-file --override-input nixvim-config "$NIXVIM_CONFIG_INPUT" --override-input dotfiles-shared "$DOTFILES_SHARED_INPUT"

      - name: Check nixvim configuration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export NIX_CONFIG="access-tokens = github.com=$GITHUB_TOKEN"
          cd nixvim
          nix build .#packages.x86_64-linux.default --dry-run --impure --no-write-lock-file
