name: Darwin CI
on:
  push:
    branches: [main]
    paths:
      - 'darwin/**'
      - 'modules/**'
      - 'nixvim/**'
      - '.github/workflows/darwin.yml'
      - '.github/actions/setup-nix/**'
      - 'Makefile'
      - 'vscode/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'darwin/**'
      - 'modules/**'
      - 'nixvim/**'
      - '.github/workflows/darwin.yml'
      - '.github/actions/setup-nix/**'
      - 'Makefile'
      - 'vscode/**'
      - 'scripts/**'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      id-token: "write"
      contents: "read"

    steps:
      - uses: actions/checkout@v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          configure-global-nixconf: "true"
          add-channel: "true"

      - name: Apply home-manager
        shell: zsh {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIXVIM_CONFIG_INPUT: path:${{ github.workspace }}/nixvim
          DOTFILES_SHARED_INPUT: path:${{ github.workspace }}/modules
        run: |
          export USER=runner
          source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          cd darwin
          nix build path:.#homeConfigurations.home.activationPackage --impure --no-write-lock-file --override-input nixvim-config "$NIXVIM_CONFIG_INPUT" --override-input dotfiles-shared "$DOTFILES_SHARED_INPUT"
          ./result/activate

      - name: Test mise install
        shell: zsh {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MISE_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
          # Skip Node.js tarball signature checks in CI (no release keys available)
          NODEJS_CHECK_SIGNATURES: "no"
          ASDF_NODEJS_SKIP_GPG: "1"
        run: |
          source $HOME/.zshenv
          source $HOME/.config/zsh/.zshrc
          mkdir -p "$HOME/.gnupg"
          chmod 700 "$HOME/.gnupg"
          gpg --batch --keyserver hkps://keyserver.ubuntu.com --recv-keys 86C8D74642E67846F8E120284DAA80D1E737BC9F
          mise install
          mise reshim
          eval "$(mise activate zsh)"
          which pre-commit
          pre-commit --version
          mise exec -- which node
          mise exec -- which go
          mise exec -- node --version
          mise exec -- go version

      - name: Check nix-darwin configuration
        shell: zsh {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
          USER: runner
          NIXVIM_CONFIG_INPUT: path:${{ github.workspace }}/nixvim
          DOTFILES_SHARED_INPUT: path:${{ github.workspace }}/modules
        run: |
          source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          export NIX_CONFIG="access-tokens = github.com=$GITHUB_TOKEN"
          cd darwin
          nix --extra-experimental-features "nix-command flakes" build path:.#darwinConfigurations.all.system --impure --no-write-lock-file --override-input nixvim-config "$NIXVIM_CONFIG_INPUT" --override-input dotfiles-shared "$DOTFILES_SHARED_INPUT"

      - name: Check nixvim configuration
        shell: zsh {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          export NIX_CONFIG="access-tokens = github.com=$GITHUB_TOKEN"
          cd nixvim
          nix build .#packages.aarch64-darwin.default --impure --no-write-lock-file

      - name: Run nix-check-all
        shell: zsh {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIXVIM_CONFIG_INPUT: path:${{ github.workspace }}/nixvim
        run: |
          source $HOME/.zshenv
          source $HOME/.config/zsh/.zshrc
          make nix-check-all-ci

      - name: Run vscode-settings
        shell: zsh {0}
        run: |
          source $HOME/.zshenv
          source $HOME/.config/zsh/.zshrc
          make vscode-apply
          make vscode-save
